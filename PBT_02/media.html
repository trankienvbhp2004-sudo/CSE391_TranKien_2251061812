<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm - Multimedia</title>
</head>
<body>
    <h1>Trang giới thiệu sản phẩm</h1>

  <!-- 3 ảnh sản phẩm -->
  <section>
    <h2>Sản phẩm nổi bật</h2>
    <figure>
      <img src="product1.jpg" alt="Sản phẩm 1 - Tai nghe không dây" loading="lazy" style="max-width:100%; height:auto;">
      <figcaption>Tai nghe không dây chất lượng cao</figcaption>
    </figure>

    <figure>
      <img src="product2.jpg" alt="Sản phẩm 2 - Đồng hồ thông minh" loading="lazy" style="max-width:100%; height:auto;">
      <figcaption>Đồng hồ thông minh đa chức năng</figcaption>
    </figure>

    <figure>
      <img src="product3.jpg" alt="Sản phẩm 3 - Loa Bluetooth" loading="lazy" style="max-width:100%; height:auto;">
      <figcaption>Loa Bluetooth âm thanh sống động</figcaption>
    </figure>
  </section>

  <!-- Video YouTube nhúng -->
  <section>
    <h2>Video giới thiệu</h2>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/MXD-aDONJes" 
      title="Video giới thiệu sản phẩm" frameborder="0" allowfullscreen></iframe>
  </section>

  <!-- Video thẻ <video> -->
  <section>
    <h2>Video trải nghiệm sản phẩm</h2>
    <video controls poster="poster.jpg" style="max-width:100%; height:auto;">
      <source src="demo.mp4" type="video/mp4">
      <source src="demo.webm" type="video/webm">
      Trình duyệt của bạn không hỗ trợ video.
    </video>
  </section>

  <!-- Audio -->
  <section>
    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
      <source src="background.mp3" type="audio/mpeg">
      <source src="background.ogg" type="audio/ogg">
      Trình duyệt của bạn không hỗ trợ audio.
    </audio>
  </section>

  <!-- SVG inline -->
  <section>
    <h2>Logo thương hiệu (SVG)</h2>
    <svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="40" fill="blue" />
      <text x="50" y="55" font-size="20" text-anchor="middle" fill="white">LOGO</text>
    </svg>
  </section>
</body>
</html>
