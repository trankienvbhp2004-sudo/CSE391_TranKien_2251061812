<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Validation Test</title>
</head>
<body>
    <h1>Form Validation Test</h1>
    <form>
        <!-- Trường hợp 1 -->
        <label>Text (required):</label>
        <input type="text" required value="">
        <br><br>

        <!-- Trường hợp 2 -->
        <label>Email:</label>
        <input type="email" value="abc">
        <br><br>

        <!-- Trường hợp 3 -->
        <label>Number (1–10):</label>
        <input type="number" min="1" max="10" value="15">
        <br><br>

        <!-- Trường hợp 4 -->
        <label>Text (pattern 10 digits):</label>
        <input type="text" pattern="[0-9]{10}" value="abc123">
        <br><br>

        <!-- Trường hợp 5 -->
        <label>Password (minlength=8):</label>
        <input type="password" minlength="8" value="123">
        <br><br>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
